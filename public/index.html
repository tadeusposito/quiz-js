<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Jovem Senador – Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg:           #0d1520;
    --card:         #101c30;
    --text:         #f0f0f0;
    --accent:       #c8a84b;
    --prompt-bg:    #101c30;
    --prompt-text:  #f0f0f0;
    --opt0-bg:      #1a3a7a; --opt0-border: #2a5abf;
    --opt1-bg:      #7a1a1a; --opt1-border: #bf2a2a;
    --opt2-bg:      #1a5a2a; --opt2-border: #2abf5a;
    --opt3-bg:      #5a4a1a; --opt3-border: #bfa02a;
    --opt-text:     #ffffff;
    --correct-bg:   #145214; --correct-border: #4caf50; --correct-text: #4caf50;
    --wrong-bg:     #521414; --wrong-border:   #f44336; --wrong-text:   #f44336;
    --missed-bg:    #3a3a1a; --missed-text:    #ffc107;
    --btn-bg:       #1e5dbf; --btn-text:       #ffffff;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .logo { font-size: 13px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; text-align: center; }
  h1 { font-size: 22px; color: #fff; text-align: center; margin-bottom: 6px; }
  .sub { font-size: 14px; color: var(--accent); text-align: center; margin-bottom: 32px; }

  /* JOIN SCREEN */
  #screen-join { width: 100%; max-width: 360px; }
  .input-group { display: flex; flex-direction: column; gap: 12px; }
  input[type=text] {
    padding: 16px 18px; font-size: 17px; border-radius: 12px;
    border: 2px solid var(--btn-bg); background: var(--card);
    color: #fff; outline: none; width: 100%;
    transition: border-color .2s;
  }
  input[type=text]:focus { border-color: var(--accent); }
  .btn-primary {
    padding: 16px; font-size: 17px; font-weight: 700; border-radius: 12px;
    background: var(--btn-bg); color: var(--btn-text); border: none; cursor: pointer;
    transition: background .15s, transform .1s;
    width: 100%;
  }
  .btn-primary:active { transform: scale(0.97); filter: brightness(.85); }
  .btn-primary:disabled { background: #444; cursor: not-allowed; }

  /* LOBBY */
  #screen-lobby { text-align: center; }
  .waiting-anim {
    width: 60px; height: 60px; border-radius: 50%;
    border: 4px solid var(--btn-bg);
    border-top-color: var(--accent);
    animation: spin 1s linear infinite;
    margin: 0 auto 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .participant-name { font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }

  /* QUESTION */
  #screen-question { width: 100%; max-width: 400px; }
  .q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .q-number { font-size: 13px; color: var(--accent); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .q-prompt {
    font-size: 20px; font-weight: 700; text-align: center;
    background: var(--prompt-bg); border-radius: 16px;
    padding: 20px; margin-bottom: 24px; color: var(--prompt-text);
    border: 1px solid var(--btn-bg); line-height: 1.4;
  }
  .options { display: flex; flex-direction: column; gap: 14px; }
  .opt-btn {
    padding: 18px 20px; font-size: 18px; font-weight: 700;
    border-radius: 14px; border: 2px solid transparent;
    cursor: pointer; transition: all .15s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .opt-btn:active:not(:disabled) { transform: scale(0.96); }
  .opt-btn:disabled { cursor: not-allowed; opacity: 0.7; }

  /* Cores das opções — via variáveis CSS customizáveis */
  .opt-0 { background: var(--opt0-bg); border-color: var(--opt0-border); color: var(--opt-text); }
  .opt-1 { background: var(--opt1-bg); border-color: var(--opt1-border); color: var(--opt-text); }
  .opt-2 { background: var(--opt2-bg); border-color: var(--opt2-border); color: var(--opt-text); }
  .opt-3 { background: var(--opt3-bg); border-color: var(--opt3-border); color: var(--opt-text); }
  /* Poll: todos os botões com a mesma cor neutra */
  .poll-mode .opt-btn { background: var(--btn-bg); border-color: var(--btn-bg); color: var(--btn-text); }
  .poll-mode .opt-btn.opt-selected { border-color: var(--accent); filter: brightness(1.3); }

  .opt-selected { border-color: var(--accent) !important; filter: brightness(1.3); }
  .opt-correct { background: var(--correct-bg) !important; border-color: var(--correct-border) !important; color: var(--correct-text) !important; }
  .opt-wrong   { background: var(--wrong-bg)   !important; border-color: var(--wrong-border)   !important; color: var(--wrong-text)   !important; }

  .ack-msg {
    text-align: center; font-size: 15px; color: var(--accent);
    margin-top: 16px; padding: 10px;
    background: var(--card); border-radius: 10px;
  }

  /* REVEAL */
  .reveal-badge {
    text-align: center; font-size: 17px; font-weight: 700;
    padding: 14px 20px; border-radius: 12px; margin-top: 20px;
  }
  .reveal-correct { background: var(--correct-bg); color: var(--correct-text); }
  .reveal-wrong { background: var(--wrong-bg); color: var(--wrong-text); }
  .reveal-missed { background: var(--missed-bg); color: var(--missed-text); }

  /* RANKING */
  #screen-ranking { width: 100%; max-width: 400px; }
  .ranking-title { text-align: center; font-size: 22px; font-weight: 800; color: var(--accent); margin-bottom: 20px; }
  .rank-list { display: flex; flex-direction: column; gap: 10px; }
  .rank-item {
    display: flex; align-items: center; gap: 14px;
    background: var(--card); border-radius: 12px;
    padding: 14px 16px; border: 1px solid var(--btn-bg);
  }
  .rank-item.me { border-color: var(--accent); background: var(--card); }
  .rank-pos { font-size: 20px; font-weight: 800; width: 30px; text-align: center; }
  .rank-1 { color: gold; }
  .rank-2 { color: silver; }
  .rank-3 { color: #cd7f32; }
  .rank-name { flex: 1; font-size: 16px; font-weight: 600; }
  .rank-score { font-size: 14px; color: var(--accent); text-align: right; }
  .rank-pts { font-size: 16px; font-weight: 700; color: var(--accent); }

  /* Resposta aberta */
  .open-answer-area { display: flex; flex-direction: column; gap: 12px; }
  .open-answer-area textarea {
    padding: 16px; font-size: 16px; border-radius: 14px;
    border: 2px solid var(--btn-bg); background: var(--card);
    color: var(--text); outline: none; resize: none;
    width: 100%; min-height: 100px; line-height: 1.5;
    transition: border-color .2s; font-family: inherit;
  }
  .open-answer-area textarea:focus { border-color: var(--accent); }
  .open-answer-area textarea:disabled { opacity: 0.6; cursor: not-allowed; }
  .char-count { font-size: 12px; color: var(--accent); text-align: right; opacity: .7; }

  /* Reações */
  #screen-reactions { width: 100%; max-width: 400px; }
  .reactions-title { font-size: 16px; font-weight: 700; color: var(--accent); text-align: center; margin-bottom: 18px; }
  .reaction-card {
    background: var(--card); border: 1px solid var(--btn-bg); border-radius: 14px;
    padding: 16px; margin-bottom: 14px;
  }
  .reaction-card.reacted { border-color: var(--accent); }
  .reaction-card.own { border-color: #2a3a50; opacity: .75; }
  .reaction-author { font-size: 13px; font-weight: 800; color: var(--accent); margin-bottom: 6px; text-transform: uppercase; }
  .reaction-field { font-size: 13px; color: #7a9cc8; font-weight: 600; margin-top: 8px; margin-bottom: 2px; }
  .reaction-text { font-size: 15px; color: var(--text); line-height: 1.4; margin-bottom: 10px; }
  .reaction-btns { display: flex; gap: 8px; justify-content: center; }
  .react-btn {
    flex: 1; padding: 10px 4px; font-size: 22px; border-radius: 10px;
    border: 2px solid transparent; background: var(--card); cursor: pointer;
    transition: all .15s; text-align: center;
  }
  .react-btn:active:not(:disabled) { transform: scale(.92); }
  .react-btn:disabled { opacity: .45; cursor: not-allowed; }
  .react-btn.chosen { border-color: var(--accent); background: #1a2a40; filter: brightness(1.2); }
  .no-reaction-msg { text-align: center; color: #7a9cc8; font-size: 14px; padding: 20px 0; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- JOIN -->
<div id="screen-join">
  <div class="logo" id="joinLogo">🏛</div>
  <h1 id="joinTitle">Quiz</h1>
  <p class="sub">Quiz em tempo real</p>
  <div class="input-group">
    <input type="text" id="nameInput" placeholder="Seu nome completo" maxlength="40" autocomplete="off" />
    <button class="btn-primary" id="joinBtn" onclick="joinQuiz()">Entrar no Quiz</button>
  </div>
  <p id="joinError" style="color:#f44336;text-align:center;margin-top:12px;font-size:14px;"></p>
</div>

<!-- LOBBY -->
<div id="screen-lobby" class="hidden">
  <div class="waiting-anim"></div>
  <div class="participant-name" id="lobbyName"></div>
  <p class="sub">Você está dentro! ✅</p>
  <p style="color:#7a9cc8;font-size:15px;text-align:center;">Aguardando o início do quiz…</p>
</div>

<!-- QUESTION -->
<div id="screen-question" class="hidden">
  <div class="q-meta">
    <span class="q-number" id="qNumber"></span>
  </div>
  <div class="q-prompt" id="qPrompt"></div>
  <div class="options" id="optionsContainer"></div>
  <div class="ack-msg hidden" id="ackMsg"></div>
  <div id="revealBadge"></div>
</div>

<!-- REACTIONS -->
<div id="screen-reactions" class="hidden">
  <div class="reactions-title" id="reactionsTitle">Reaja às respostas!</div>
  <div id="reactionCards"></div>
</div>

<!-- RANKING -->
<div id="screen-ranking" class="hidden">
  <div class="ranking-title">🏆 Resultado Final</div>
  <div class="rank-list" id="rankList"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myName = '';
  let myAnswer = null;
  let totalQuestions = 0;

  // ── ID persistente no localStorage ─────────────────────────────────────────
  // Gerado na primeira visita e mantido entre refreshes/reconexões.
  // Apagado só quando o servidor manda 'kicked' (reset do quiz).
  function getOrCreatePlayerId() {
    let id = localStorage.getItem('quiz_player_id');
    if (!id) {
      id = 'p_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
      localStorage.setItem('quiz_player_id', id);
    }
    return id;
  }
  const myPlayerId = getOrCreatePlayerId();

  // ── Reconexão automática ao carregar/recarregar ─────────────────────────────
  // Se tiver nome salvo, tenta retomar sem mostrar tela de nome.
  const savedName = localStorage.getItem('quiz_player_name');
  if (savedName) {
    myName = savedName;
  }

  socket.on('connect', () => {
    // Busca config logo ao conectar para mostrar nome do evento na tela de entrada
    fetch('/api/config').then(r => r.json()).then(applyConfig).catch(() => {});
    // Sempre que conectar (inclusive após refresh), tenta rejoin se tiver nome salvo
    const name = localStorage.getItem('quiz_player_name');
    if (name) {
      myName = name;
      socket.emit('join', { name, playerId: myPlayerId });
    }
  });

  function show(id) {
    ['screen-join','screen-lobby','screen-question','screen-reactions','screen-ranking'].forEach(s => {
      document.getElementById(s).classList.toggle('hidden', s !== id);
    });
  }

  function joinQuiz() {
    const name = document.getElementById('nameInput').value.trim();
    if (name.length < 2) {
      document.getElementById('joinError').textContent = 'Digite seu nome completo.';
      return;
    }
    myName = name;
    localStorage.setItem('quiz_player_name', name);
    document.getElementById('joinBtn').disabled = true;
    socket.emit('join', { name, playerId: myPlayerId });
  }

  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinQuiz();
  });

  let currentState = null;

  socket.on('joined', (state) => {
    document.getElementById('lobbyName').textContent = myName;
    applyConfig(state.config);
    applyState(state);
  });

  socket.on('config', applyConfig);

  const _loadedFonts = {};
  function applyFont(font) {
    if (!font || font === 'Inter') { document.body.style.fontFamily = ''; return; }
    if (!_loadedFonts[font]) {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = `https://fonts.googleapis.com/css2?family=${font.replace(/ /g,'+')}:wght@400;700;800&display=swap`;
      document.head.appendChild(link);
      _loadedFonts[font] = true;
    }
    document.body.style.fontFamily = `'${font}', system-ui, sans-serif`;
  }

  function applyConfig(cfg) {
    if (!cfg) return;
    const name = cfg.eventName || 'Quiz';
    const t = document.getElementById('joinTitle');
    if (t) t.textContent = name;
    document.title = name;
    if (cfg.colors) applyColors(cfg.colors);
    if (cfg.font) applyFont(cfg.font);
  }

  function applyColors(c) {
    let el = document.getElementById('custom-colors');
    if (!el) { el = document.createElement('style'); el.id = 'custom-colors'; document.head.appendChild(el); }
    el.textContent = `:root {
      --bg:            ${c.bg};
      --card:          ${c.card};
      --text:          ${c.text};
      --accent:        ${c.accent};
      --prompt-bg:     ${c.promptBg};
      --prompt-text:   ${c.promptText};
      --opt0-bg:       ${c.opt0Bg};   --opt0-border: ${c.opt0Border};
      --opt1-bg:       ${c.opt1Bg};   --opt1-border: ${c.opt1Border};
      --opt2-bg:       ${c.opt2Bg};   --opt2-border: ${c.opt2Border};
      --opt3-bg:       ${c.opt3Bg};   --opt3-border: ${c.opt3Border};
      --opt-text:      ${c.optText};
      --correct-bg:    ${c.correctBg};  --correct-border: ${c.correctBorder};  --correct-text: ${c.correctText};
      --wrong-bg:      ${c.wrongBg};    --wrong-border:   ${c.wrongBorder};    --wrong-text:   ${c.wrongText};
      --missed-bg:     ${c.missedBg};   --missed-text:    ${c.missedText};
      --btn-bg:        ${c.btnBg};      --btn-text:       ${c.btnText};
    }`;
  }

  socket.on('state', applyState);

  socket.on('openPageSync', ({ page, openAnswers }) => {
    currentPageAnswers = openAnswers || [];
    // Se estiver na fase reveal de questão aberta, atualiza a tela de reações
    if (currentState && currentState.phase === 'reveal' && currentState.question?.type === 'open') {
      showReactionScreen(currentState);
    }
  });

  socket.on('reactAck', ({ targetPlayerId, value }) => {
    // Já tratado localmente em sendReaction
  });

  socket.on('kicked', () => {
    // Reset completo: limpa localStorage e volta pra tela de nome
    localStorage.removeItem('quiz_player_name');
    localStorage.removeItem('quiz_player_id');
    myName = '';
    myAnswer = null;
    myOpenText = null;
    renderQuestion._lastIndex = -1;
    document.getElementById('nameInput').value = '';
    document.getElementById('joinBtn').disabled = false;
    document.getElementById('joinError').textContent = '';
    show('screen-join');
  });

  function applyState(state) {
    currentState = state;
    totalQuestions = state.totalQuestions;

    if (state.phase === 'selectQuiz' || state.phase === 'lobby') {
      if (myName) {
        document.getElementById('lobbyName').textContent = myName;
        if (state.config) applyConfig(state.config);
        const subEl = document.getElementById('lobbySubtitle');
        const waitEl = document.getElementById('lobbyWait');
        if (state.phase === 'selectQuiz') {
          if (subEl) subEl.textContent = 'Você está dentro! ✅';
          if (waitEl) waitEl.textContent = 'Aguardando o apresentador selecionar o quiz…';
        } else {
          const qName = state.config?.quizNames?.[state.activeQuiz] || (state.activeQuiz ? `Quiz ${state.activeQuiz}` : '');
          if (subEl) subEl.textContent = qName ? `${qName} ✅` : 'Você está dentro! ✅';
          if (waitEl) waitEl.textContent = 'Aguardando o início do quiz…';
        }
        show('screen-lobby');
      }
      return;
    }

    if (state.phase === 'finished') {
      // Tela de suspense — aguardando apresentador revelar o ranking
      document.getElementById('lobbyName').textContent = myName;
      document.querySelector('#screen-lobby .waiting-anim').style.borderTopColor = '#c8a84b';
      document.querySelector('#screen-lobby p.sub').textContent = 'Quiz encerrado! ✅';
      document.querySelector('#screen-lobby p:last-child').textContent = 'Aguarde o resultado…';
      show('screen-lobby');
      return;
    }

    if (state.phase === 'ranking') {
      renderRanking(state.ranking);
      show('screen-ranking');
      return;
    }

    if (state.phase === 'question') {
      renderQuestion(state);
      show('screen-question');
    } else if (state.phase === 'reveal') {
      if (state.question?.type === 'open') {
        renderQuestion(state); // vai chamar showReactionScreen internamente
      } else {
        renderQuestion(state);
        show('screen-question');
      }
    }
  }

  function renderQuestion(state) {
    const q = state.question;
    const qIdx = state.currentIndex;

    if (renderQuestion._lastIndex !== qIdx) {
      myAnswer = null;
      myOpenText = null;
      myReactions = {};
      currentPageAnswers = [];
      renderQuestion._lastIndex = qIdx;
      document.getElementById('ackMsg').classList.add('hidden');
      document.getElementById('revealBadge').innerHTML = '';
    }

    document.getElementById('qNumber').textContent = `Questão ${qIdx + 1} de ${totalQuestions}`;
    document.getElementById('qPrompt').textContent = q.prompt;

    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';

    if (q.type === 'wordcloud') {
      // ── Nuvem de palavras: igual à aberta ──────────────────────────────
      q.type = 'open'; // reutiliza o render de campos abertos
    }

    if (q.type === 'open') {
      // ── Questão aberta ──────────────────────────────────────────────────
      const submitted = myOpenText !== null;
      const fields = q.fields || ['Resposta'];

      if (state.phase === 'reveal') {
        // Na fase reveal, mostrar tela de reações
        showReactionScreen(state);
        return;
      }

      let fieldsHtml = '<div class="open-answer-area">';
      fields.forEach((label, i) => {
        const storedVal = submitted && myOpenText ? (Array.isArray(myOpenText) ? myOpenText[i] : (i === 0 ? myOpenText : '')) : '';
        fieldsHtml += `
          <div style="margin-bottom:4px;">
            <label style="font-size:12px;color:var(--accent);font-weight:700;display:block;margin-bottom:4px;">${label}</label>
            <textarea id="openInput_${i}" maxlength="300" placeholder="${label}…" rows="3"
              style="width:100%;padding:12px;font-size:15px;border-radius:12px;border:2px solid var(--btn-bg);background:var(--card);color:var(--text);outline:none;resize:none;font-family:inherit;transition:border-color .2s;"
              ${submitted ? 'disabled' : ''}
            >${storedVal}</textarea>
            <div style="font-size:11px;color:var(--accent);text-align:right;opacity:.7;" id="cc_${i}">${storedVal.length}/300</div>
          </div>`;
      });
      fieldsHtml += `
        <button class="btn-primary" id="openSubmitBtn" onclick="sendOpenAnswer()"
          ${submitted ? 'disabled' : ''}>
          ${submitted ? '✅ Enviado' : 'Enviar resposta'}
        </button>
      </div>`;
      container.innerHTML = fieldsHtml;

      if (!submitted) {
        fields.forEach((_, i) => {
          const ta = document.getElementById(`openInput_${i}`);
          if (ta) ta.addEventListener('input', () => {
            const cc = document.getElementById(`cc_${i}`);
            if (cc) cc.textContent = `${ta.value.length}/300`;
          });
        });
      }
      return;
    }

    // ── Múltipla escolha / Poll ───────────────────────────────────────────
    if (q.type === 'poll') container.classList.add('poll-mode');
    else container.classList.remove('poll-mode');

    q.optionLabels.forEach((label, i) => {
      const btn = document.createElement('button');
      btn.className = `opt-btn opt-${i % 4}`;
      btn.textContent = label;
      if (myAnswer !== null) btn.disabled = true;
      if (myAnswer === i) btn.classList.add('opt-selected');
      if (state.phase === 'reveal') {
        btn.disabled = true;
        if (q.type !== 'poll' && q.correctIndex !== null) {
          if (i === q.correctIndex) btn.classList.add('opt-correct');
          else if (i === myAnswer && myAnswer !== q.correctIndex) btn.classList.add('opt-wrong');
        } else if (q.type === 'poll' && i === myAnswer) {
          btn.classList.add('opt-selected');
        }
      }
      btn.onclick = () => sendAnswer(i);
      container.appendChild(btn);
    });

    if (state.phase === 'reveal') {
      if (q.type === 'poll') {
        document.getElementById('revealBadge').innerHTML = myAnswer !== null
          ? `<div class="reveal-badge" style="background:var(--card);color:var(--accent);">📊 Voto registrado!</div>`
          : `<div class="reveal-badge reveal-missed">⏱ Não votou</div>`;
      } else if (myAnswer !== null) {
        const correct = myAnswer === q.correctIndex;
        document.getElementById('revealBadge').innerHTML =
          `<div class="reveal-badge ${correct ? 'reveal-correct' : 'reveal-wrong'}">
            ${correct ? '✅ Correto!' : '❌ Errou…'}
          </div>`;
      } else {
        document.getElementById('revealBadge').innerHTML =
          `<div class="reveal-badge reveal-missed">⏱ Não respondeu a tempo</div>`;
      }
    }
  }
  renderQuestion._lastIndex = -1;

  function sendAnswer(optionIndex) {
    if (myAnswer !== null) return;
    myAnswer = optionIndex;
    socket.emit('answer', { optionIndex });
    document.getElementById('ackMsg').textContent = '✅ Resposta registrada!';
    document.getElementById('ackMsg').classList.remove('hidden');
    document.querySelectorAll('.opt-btn').forEach((btn, i) => {
      btn.disabled = true;
      if (i === optionIndex) btn.classList.add('opt-selected');
    });
  }

  function sendOpenAnswer() {
    if (myOpenText !== null) return;
    // Coletar todos os campos
    const inputs = document.querySelectorAll('[id^="openInput_"]');
    const fields = Array.from(inputs).map(i => i.value.trim());
    if (fields.every(f => !f)) return;
    myOpenText = fields;
    socket.emit('answerOpen', { fields });
    inputs.forEach(i => i.disabled = true);
    const btn = document.getElementById('openSubmitBtn');
    if (btn) { btn.disabled = true; btn.textContent = '✅ Enviado'; }
    const isWc = currentState?.question?.type === 'wordcloud';
    document.getElementById('ackMsg').textContent = isWc ? '☁️ Palavra enviada!' : '✅ Resposta enviada!';
    document.getElementById('ackMsg').classList.remove('hidden');
  }

  // ── Tela de reações ────────────────────────────────────────────────────────
  function showReactionScreen(state) {
    if (!currentPageAnswers || currentPageAnswers.length === 0) {
      show('screen-lobby');
      document.querySelector('#screen-lobby p.sub').textContent = 'Aguardando respostas no telão…';
      return;
    }
    const fields = state.question?.fields || ['Resposta'];
    const title = document.getElementById('reactionsTitle');
    if (title) title.textContent = `Reaja às respostas! (${currentPageAnswers.length} no telão)`;

    const container = document.getElementById('reactionCards');
    container.innerHTML = '';

    let hasOthers = false;

    currentPageAnswers.forEach(ans => {
      const isOwn = ans.playerId === myPlayerId;
      const reacted = myReactions[ans.playerId];

      const card = document.createElement('div');
      card.className = `reaction-card${reacted !== undefined ? ' reacted' : ''}${isOwn ? ' own' : ''}`;
      card.id = `rcard_${ans.playerId}`;

      let fieldsHtml = '';
      (ans.fields || (ans.text ? [ans.text] : [])).forEach((val, i) => {
        if (!val) return;
        fieldsHtml += `<div class="reaction-field">${fields[i] || ''}</div>
          <div class="reaction-text">${val}</div>`;
      });

      if (isOwn) {
        // Própria resposta: mostra mas sem botões de reação
        card.innerHTML = `
          <div class="reaction-author" style="color:var(--accent);">✍️ ${ans.name} <span style="font-size:11px;opacity:.7;">(você)</span></div>
          ${fieldsHtml}
          <div class="no-reaction-msg" style="font-size:12px;padding:8px 0 0;">Não é possível reagir à própria resposta</div>`;
      } else {
        hasOthers = true;
        const reacts = [
          { emoji: '👎', value: -1 },
          { emoji: '🤷', value: 0 },
          { emoji: '👍', value: 1 },
          { emoji: '❤️', value: 2 },
        ];
        const btnsHtml = reacts.map(r =>
          `<button class="react-btn${reacted === r.value ? ' chosen' : ''}"
            onclick="sendReaction('${ans.playerId}', ${r.value})"
            ${reacted !== undefined ? 'disabled' : ''}>${r.emoji}</button>`
        ).join('');
        card.innerHTML = `
          <div class="reaction-author">✍️ ${ans.name}</div>
          ${fieldsHtml}
          <div class="reaction-btns">${btnsHtml}</div>`;
      }
      container.appendChild(card);
    });

    if (!container.children.length) {
      container.innerHTML = '<div class="no-reaction-msg">Aguardando respostas no telão… ⏳</div>';
    } else if (!hasOthers) {
      // Só tem a própria resposta na página
      container.innerHTML += '<div class="no-reaction-msg" style="margin-top:12px;">Sua resposta está no telão.<br>Aguarde outras aparecerem para reagir.</div>';
    }
    show('screen-reactions');
  }

  function sendReaction(targetPlayerId, value) {
    if (myReactions[targetPlayerId] !== undefined) return;
    myReactions[targetPlayerId] = value;
    socket.emit('react', { targetPlayerId, value });
    // Atualiza visualmente
    const card = document.getElementById(`rcard_${targetPlayerId}`);
    if (card) {
      card.classList.add('reacted');
      card.querySelectorAll('.react-btn').forEach(btn => {
        btn.disabled = true;
        const btnVal = parseInt(btn.getAttribute('onclick').match(/, (-?\d+)/)?.[1]);
        if (btnVal === value) btn.classList.add('chosen');
      });
    }
  }

  function renderRanking(ranking) {
    const list = document.getElementById('rankList');
    list.innerHTML = '';
    ranking.forEach(item => {
      const isMe = item.name.toLowerCase() === myName.toLowerCase();
      const medals = ['🥇','🥈','🥉'];
      const posStr = item.rank <= 3 ? medals[item.rank - 1] : `${item.rank}º`;
      const posClass = item.rank <= 3 ? `rank-${item.rank}` : '';
      list.innerHTML += `
        <div class="rank-item ${isMe ? 'me' : ''}">
          <div class="rank-pos ${posClass}">${posStr}</div>
          <div class="rank-name">${item.name}${isMe ? ' 👈' : ''}</div>
          <div class="rank-score">
            <div class="rank-pts">${item.score} pts</div>
            <div>${(item.totalMs / 1000).toFixed(1)}s</div>
          </div>
        </div>`;
    });
  }
</script>
</body>
</html>
