<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Telão – Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --azul: #1a3d6b;
    --azul-claro: #1e5dbf;
    --dourado: #c8a84b;
    --bg: #08101e;
    --card: #0c1828;
    --text: #f0f0f0;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* PIN SCREEN */
  #pin-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100;
  }
  #pin-screen h2 { color: var(--dourado); font-size: 24px; margin-bottom: 20px; }
  #pin-screen input {
    padding: 14px 20px; font-size: 20px; border-radius: 10px;
    border: 2px solid var(--azul); background: var(--card); color: #fff;
    text-align: center; outline: none; letter-spacing: 6px; width: 200px;
  }
  #pin-screen button {
    margin-top: 14px; padding: 12px 40px; font-size: 16px; font-weight: 700;
    border-radius: 10px; background: var(--azul-claro); color: #fff; border: none; cursor: pointer;
  }
  #pin-error { color: #f44336; margin-top: 10px; font-size: 14px; }

  /* HEADER */
  .header {
    background: linear-gradient(90deg, #091520 0%, #0c1e30 100%);
    border-bottom: 2px solid var(--azul);
    padding: 10px 30px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .header-brand { display: flex; align-items: center; gap: 14px; }
  .header-brand span { color: #fff; font-size: 18px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
  #headerLogo { height: 40px; max-width: 140px; object-fit: contain; display: none; }
  .header-stats { display: flex; gap: 24px; align-items: center; }
  .stat-pill {
    background: var(--card); border: 1px solid #1e3860; border-radius: 20px;
    padding: 6px 16px; font-size: 14px; color: #7a9cc8;
  }
  .stat-pill strong { color: var(--dourado); font-size: 18px; }

  /* MAIN AREA */
  .main { flex: 1; display: flex; overflow: hidden; }

  /* LEFT: content */
  .content-area {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 30px; gap: 20px;
  }

  /* LOBBY */
  #lobby-view { text-align: center; }
  .qr-container {
    background: white; border-radius: 16px; padding: 20px;
    display: inline-block; margin-bottom: 16px;
  }
  #qr-code { width: 200px; height: 200px; }
  .lobby-url { font-size: 28px; font-weight: 800; color: var(--dourado); margin: 10px 0 6px; }
  .lobby-participants { font-size: 18px; color: #7a9cc8; }
  .lobby-participants strong { color: #fff; font-size: 24px; }

  /* QUESTION */
  #question-view { width: 100%; max-width: 900px; }
  .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .q-label { font-size: 15px; color: var(--dourado); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .q-prompt-big {
    font-size: clamp(28px, 4vw, 52px); font-weight: 800; text-align: center;
    line-height: 1.2; margin-bottom: 32px;
    text-shadow: 0 2px 20px rgba(0,0,0,.5);
  }
  .options-grid {
    display: grid;
    gap: 16px;
  }
  .options-grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .options-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .options-grid.cols-4 { grid-template-columns: 1fr 1fr; }

  .opt-card {
    padding: 24px 28px; border-radius: 16px; font-size: clamp(20px, 2.5vw, 32px);
    font-weight: 800; text-align: center;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; transition: transform .3s;
    position: relative; overflow: hidden;
  }
  .opt-card .opt-label { flex: 1; }
  .opt-card .opt-bar {
    position: absolute; bottom: 0; left: 0; height: 5px;
    background: rgba(255,255,255,0.4); transition: width .5s;
  }
  .opt-card .opt-count { font-size: 18px; font-weight: 700; opacity: .85; }

  .opt-c-0 { background: #1e3a8a; }
  .opt-c-1 { background: #7f1d1d; }
  .opt-c-2 { background: #14532d; }
  .opt-c-3 { background: #713f12; }

  .opt-card.correct { filter: brightness(1.4); transform: scale(1.02); border: 3px solid #4caf50; }
  .opt-card.wrong { opacity: 0.45; }

  /* Media + question layout */
  .q-layout {
    display: flex; gap: 28px; align-items: flex-start; width: 100%;
  }
  .q-layout.no-media { flex-direction: column; align-items: center; }
  .q-layout.no-media #qPromptBig { max-width: 820px; }
  .q-layout.no-media .q-options-col { width: 100%; max-width: 820px; }

  .q-media-col {
    flex: 0 0 52%; display: flex; flex-direction: column; gap: 12px; min-width: 0;
  }
  .q-options-col { flex: 1; display: flex; flex-direction: column; gap: 16px; min-width: 0; }

  /* Media player */
  .media-wrapper {
    position: relative; border-radius: 14px; overflow: hidden;
    background: #000; border: 2px solid #1e3860;
    cursor: zoom-in;
  }
  .media-wrapper img {
    width: 100%; max-height: 62vh; object-fit: contain; display: block;
  }
  .media-wrapper video {
    width: 100%; max-height: 62vh; object-fit: contain; display: block;
  }
  /* Ícone de expandir no canto */
  .expand-hint {
    position: absolute; top: 10px; right: 10px;
    background: rgba(0,0,0,0.6); color: #fff;
    border-radius: 6px; padding: 5px 9px; font-size: 18px;
    pointer-events: none; opacity: 0; transition: opacity .2s;
  }
  .media-wrapper:hover .expand-hint { opacity: 1; }

  /* Lightbox */
  #lightbox {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.95);
    align-items: center; justify-content: center;
    cursor: zoom-out;
  }
  #lightbox.open { display: flex; }
  #lightbox-media {
    max-width: 96vw; max-height: 94vh;
    object-fit: contain; border-radius: 6px;
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
    cursor: default;
  }
  #lightbox-close {
    position: fixed; top: 16px; right: 20px;
    color: #fff; font-size: 32px; font-weight: 700;
    cursor: pointer; z-index: 10000;
    background: rgba(255,255,255,0.15); border-radius: 50%;
    width: 48px; height: 48px; display: flex;
    align-items: center; justify-content: center;
    user-select: none; line-height: 1;
  }
  #lightbox-close:hover { background: rgba(255,255,255,0.3); }

  /* Opções menores quando há mídia */
  .has-media .opt-card {
    padding: 12px 14px;
    font-size: clamp(13px, 1.4vw, 20px);
  }
  .has-media .opt-card .opt-count { font-size: 12px; }
  .video-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.35);
    cursor: pointer; transition: background .2s;
  }
  .video-overlay:hover { background: rgba(0,0,0,0.2); }
  .video-overlay.playing { background: transparent; }
  .video-overlay.playing:hover { background: rgba(0,0,0,0.15); }
  .play-icon {
    width: 70px; height: 70px; border-radius: 50%;
    background: rgba(200,168,75,0.9);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; transition: transform .15s, opacity .2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .video-overlay.playing .play-icon { opacity: 0; }
  .video-overlay.playing:hover .play-icon { opacity: 1; transform: scale(1.1); }

  /* Progress bar */
  .progress-bar {
    width: 100%; height: 8px; background: #162848; border-radius: 4px; margin-top: 4px;
  }
  .progress-fill {
    height: 100%; border-radius: 4px; background: var(--dourado);
    transition: width .4s;
  }

  /* RANKING */
  #ranking-view { width: 100%; max-width: 800px; }
  .ranking-title { text-align: center; font-size: 40px; font-weight: 900; color: var(--dourado); margin-bottom: 24px; }
  .rank-list-big { display: flex; flex-direction: column; gap: 12px; }
  .rank-row {
    display: flex; align-items: center; gap: 20px;
    background: var(--card); border-radius: 14px;
    padding: 16px 24px; border: 1px solid #1e3860;
    transition: all .3s;
  }
  .rank-row.top { border-color: var(--dourado); background: #162848; }
  .rank-pos-big { font-size: 28px; font-weight: 900; width: 50px; text-align: center; }
  .rank-name-big { flex: 1; font-size: 22px; font-weight: 700; }
  .rank-pts-big { font-size: 20px; font-weight: 700; color: var(--dourado); text-align: right; }
  .rank-time-big { font-size: 14px; color: #7a9cc8; text-align: right; }

  /* RIGHT: controls */
  .controls-panel {
    width: 240px; background: #091626; border-left: 1px solid #162848;
    display: flex; flex-direction: column; gap: 12px; padding: 20px;
    flex-shrink: 0;
  }
  .ctrl-section { font-size: 11px; color: #3a62a0; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .ctrl-btn {
    padding: 14px; font-size: 15px; font-weight: 700; border-radius: 10px;
    border: none; cursor: pointer; width: 100%; transition: all .15s;
  }
  .ctrl-btn:active { transform: scale(0.96); }
  .ctrl-next { background: var(--azul-claro); color: #fff; }
  .ctrl-next:hover { background: #2a72d4; }
  .ctrl-reveal { background: #c8a84b; color: #000; }
  .ctrl-reveal:hover { background: #d4b85c; }
  .ctrl-reset { background: #3a1a1a; color: #f44336; }
  .ctrl-reset:hover { background: #4a1a1a; }
  .ctrl-btn:disabled { background: #101e35; color: #364e80; cursor: not-allowed; }

  .answers-live {
    background: var(--card); border-radius: 10px; padding: 12px;
    font-size: 13px; color: #7a9cc8;
  }
  .answers-live strong { color: #fff; font-size: 22px; display: block; }

  /* SELEÇÃO DE QUIZ */
  #select-quiz-view { text-align: center; }
  .quiz-select-title { font-size: 28px; font-weight: 800; color: var(--dourado); margin-bottom: 10px; }
  .quiz-select-sub { font-size: 16px; color: #7a9cc8; margin-bottom: 36px; }
  .quiz-select-btns { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
  .quiz-btn {
    padding: 32px 48px; border-radius: 20px; font-size: 28px; font-weight: 900;
    border: 3px solid transparent; cursor: pointer; transition: all .2s;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    min-width: 200px;
  }
  .quiz-btn-1 { background: #0c1e38; border-color: var(--azul-claro); color: #fff; }
  .quiz-btn-1:hover { background: #1a3a6a; transform: scale(1.04); }
  .quiz-btn-2 { background: #1e1400; border-color: var(--dourado); color: #fff; }
  .quiz-btn-2:hover { background: #3a2800; transform: scale(1.04); }
  .quiz-btn-3 { background: #1a0a1e; border-color: #a855f7; color: #fff; }
  .quiz-btn-3:hover { background: #2d1040; transform: scale(1.04); }
  .quiz-btn-4 { background: #001a14; border-color: #10b981; color: #fff; }
  .quiz-btn-4:hover { background: #00301e; transform: scale(1.04); }
  .quiz-btn-5 { background: #1a0a00; border-color: #f97316; color: #fff; }
  .quiz-btn-5:hover { background: #301200; transform: scale(1.04); }
  .quiz-btn-count { font-size: 13px; font-weight: 400; opacity: .8; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- PIN -->
<div id="pin-screen">
  <h2 id="pinScreenTitle">Telão</h2>
  <input type="password" id="pinInput" placeholder="PIN" maxlength="8" />
  <br>
  <button onclick="authPresenter()">Entrar</button>
  <div id="pin-error"></div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-brand">
    <img id="headerLogo" src="" alt="logo">
    <span id="headerEventName">Quiz Interativo</span>
  </div>
  <div class="header-stats">
    <div class="stat-pill">Questão <strong id="hdrQ">–</strong></div>
    <div class="stat-pill">Participantes <strong id="hdrP">0</strong></div>
    <div class="stat-pill" id="hdrPhase" style="color:var(--dourado)">Lobby</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="content-area">

    <!-- SELEÇÃO DE QUIZ -->
    <div id="select-quiz-view" class="hidden">
      <div class="quiz-select-title" id="selectEventName">Quiz Interativo</div>
      <div class="quiz-select-sub">Selecione qual quiz iniciar</div>
      <div class="quiz-select-btns" id="quizSelectBtns"></div>
    </div>

    <!-- LOBBY -->
    <div id="lobby-view" class="hidden">
      <div class="qr-container">
        <canvas id="qr-code"></canvas>
      </div>
      <div class="lobby-url" id="lobbyUrl"></div>
      <div class="lobby-participants">Participantes prontos: <strong id="lobbyCount">0</strong></div>
    </div>

    <!-- QUESTION -->
    <div id="question-view" class="hidden" style="width:100%;max-width:960px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <span class="q-label" id="qLabel"></span>
        <div class="progress-bar" style="width:180px;margin:0;">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
      <!-- layout dinâmico: com ou sem mídia -->
      <div class="q-layout no-media" id="qLayout">
        <!-- Coluna esquerda: mídia + prompt (só aparece se tiver mídia) -->
        <div class="q-media-col hidden" id="qMediaCol">
          <div class="media-wrapper" id="mediaWrapper"></div>
          <div class="q-prompt-big" id="qPromptMedia" style="font-size:clamp(16px,1.8vw,24px);margin-bottom:0;"></div>
        </div>
        <!-- Coluna direita: prompt (sem mídia) + opções -->
        <div class="q-options-col" id="qOptionsCol">
          <div class="q-prompt-big" id="qPromptBig"></div>
          <div class="options-grid" id="optionsGrid"></div>
        </div>
      </div>
    </div>

    <!-- RANKING -->
    <div id="ranking-view" class="hidden">
      <div class="ranking-title">🏆 Ranking Final</div>
      <div class="rank-list-big" id="rankListBig"></div>
    </div>

  </div>

  <!-- CONTROLS -->
  <div class="controls-panel">
    <div style="margin-top: 20px;">
      <div class="ctrl-section">Controles</div>
    <button class="ctrl-btn" id="btnNext" onclick="cmd('next')" style="background:var(--azul-claro);color:#fff;">▶ Próxima Questão</button>
    <button class="ctrl-btn" id="btnReveal" onclick="cmd('reveal')" disabled style="background:#c8a84b;color:#000;margin-top:8px;">👁 Revelar Resposta</button>
    <button class="ctrl-btn" id="btnPlayPause" onclick="toggleVideo()" style="background:#1a3a60;color:#7ab0ff;margin-top:8px;display:none;">▶ Play Vídeo</button>
    <button class="ctrl-btn" id="btnBackSelect" onclick="cmd('backToSelect')" style="background:#1a2a40;color:#7a9cc8;margin-top:8px;">← Trocar Quiz</button>
    <button class="ctrl-btn" onclick="if(confirm('Resetar tudo e expulsar participantes?')) cmd('lobby')" style="background:#3a1a1a;color:#f44336;margin-top:8px;">↺ Reset Total</button>
    </div>

    <div style="margin-top: 20px;">
      <div class="ctrl-section">Respostas (questão atual)</div>
      <div class="answers-live">
        <strong id="answerCount">0</strong>
        de <span id="answerTotal">0</span> responderam
      </div>
    </div>

    <div style="margin-top: 16px;">
      <div class="ctrl-section">Fase</div>
      <div class="answers-live" id="phaseLabel" style="color:var(--dourado);font-weight:700;">Lobby</div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <div id="lightbox-close" onclick="event.stopPropagation(); closeLightbox()">✕</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let presenterPin = '';
  let currentState = null;

  // Busca nome do evento assim que carrega (antes de autenticar)
  fetch('/api/config').then(r => r.json()).then(cfg => {
    if (cfg.eventName) {
      const el = document.getElementById('pinScreenTitle');
      if (el) el.textContent = cfg.eventName;
      document.title = cfg.eventName;
    }
    if (cfg.font) applyFont(cfg.font);
  }).catch(() => {});

  function authPresenter() {
    presenterPin = document.getElementById('pinInput').value;
    socket.emit('presenterJoin', { pin: presenterPin });
  }
  document.getElementById('pinInput').addEventListener('keydown', e => { if (e.key === 'Enter') authPresenter(); });

  socket.on('presenterError', msg => {
    document.getElementById('pin-error').textContent = msg;
  });

  socket.on('presenterState', (state) => {
    document.getElementById('pin-screen').style.display = 'none';
    if (state.config?.eventName) document.title = state.config.eventName;
    // Pré-carrega todas as mídias na primeira vez que recebe as questions
    if (!currentState && state.questions) preloadAllMedia(state.questions);
    // Nova questão → força rebuild da mídia
    if (!currentState || currentState.currentIndex !== state.currentIndex) _lastMediaUrl = null;
    currentState = state;
    applyState(state);
  });

  socket.on('presenterExtra', (extra) => {
    updateAnswerCounts(extra);
  });

  // Também recebe eventos gerais de estado
  const _loadedFonts = {};
  function applyFont(font) {
    if (!font || font === 'Inter') { document.body.style.fontFamily = ''; return; }
    if (!_loadedFonts[font]) {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = `https://fonts.googleapis.com/css2?family=${font.replace(/ /g,'+')}:wght@400;700;800;900&display=swap`;
      document.head.appendChild(link);
      _loadedFonts[font] = true;
    }
    document.body.style.fontFamily = `'${font}', system-ui, sans-serif`;
  }

  socket.on('config', (cfg) => {
    if (currentState) {
      currentState.config = cfg;
      applyState(currentState);
    }
  });

  socket.on('state', (state) => {
    if (currentState) {
      if (currentState.currentIndex !== state.currentIndex) _lastMediaUrl = null;
      currentState = { ...currentState, ...state };
      applyState(currentState);
    }
  });

  function cmd(action) {
    socket.emit('cmd', { pin: presenterPin, action });
  }

  function selectQuiz(quizId) {
    socket.emit('cmd', { pin: presenterPin, action: 'selectQuiz', quizId });
  }

  function applyState(state) {
    // Header
    document.getElementById('hdrP').textContent = state.participantCount || 0;
    document.getElementById('hdrQ').textContent = state.currentIndex >= 0 ? `${state.currentIndex + 1}/${state.totalQuestions}` : '–';
    const phaseNames = { selectQuiz: 'Seleção', lobby: 'Lobby', question: 'Respondendo', reveal: 'Revelando', ranking: 'Ranking', finished: 'Encerrado' };
    const activeQuizName = state.activeQuiz && state.config?.quizNames?.[state.activeQuiz]
      ? state.config.quizNames[state.activeQuiz] : (state.activeQuiz ? `Quiz ${state.activeQuiz}` : '');
    const quizLabel = activeQuizName ? ` · ${activeQuizName}` : '';
    document.getElementById('hdrPhase').textContent = (phaseNames[state.phase] || state.phase) + quizLabel;
    document.getElementById('phaseLabel').textContent = (phaseNames[state.phase] || state.phase) + quizLabel;

    // Nomes do evento, logo e fonte
    if (state.config) {
      const eName = state.config.eventName || 'Quiz Interativo';
      const hdr = document.getElementById('headerEventName');
      const sel = document.getElementById('selectEventName');
      if (hdr) hdr.textContent = eName;
      if (sel) sel.textContent = eName;
      document.title = eName;
      // Logo
      const logoEl = document.getElementById('headerLogo');
      if (logoEl) {
        if (state.config.logoUrl) {
          logoEl.src = state.config.logoUrl;
          logoEl.style.display = 'block';
        } else {
          logoEl.style.display = 'none';
        }
      }
      // Fonte
      applyFont(state.config.font || 'Inter');
    }

    // Botões de seleção de quiz — só mostra quizes com questões
    if (state.questions && state.config) {
      const colors = ['#1e5dbf','#c8a84b','#a855f7','#10b981','#f97316'];
      const container = document.getElementById('quizSelectBtns');
      if (container) {
        container.innerHTML = '';
        for (let i = 1; i <= 5; i++) {
          const count = state.questions.filter(q => (q.quizId || 1) === i).length;
          if (count === 0) continue;
          const name = state.config.quizNames?.[i] || `Quiz ${i}`;
          const btn = document.createElement('button');
          btn.className = `quiz-btn quiz-btn-${i}`;
          btn.innerHTML = `${name}<span class="quiz-btn-count">${count} ${count !== 1 ? 'questões' : 'questão'}</span>`;
          btn.onclick = () => selectQuiz(i);
          container.appendChild(btn);
        }
      }
    }

    // Botões
    const isSelectQuiz = state.phase === 'selectQuiz';
    const isQuestion = state.phase === 'question';
    const isFinished = state.phase === 'finished';
    const isRanking = state.phase === 'ranking';
    document.getElementById('btnReveal').disabled = !isQuestion;
    document.getElementById('btnBackSelect').style.display = isSelectQuiz ? 'none' : 'block';
    const btnNext = document.getElementById('btnNext');
    btnNext.style.display = isSelectQuiz ? 'none' : 'block';
    if (isFinished) {
      btnNext.textContent = '🏆 Revelar Ranking';
      btnNext.onclick = () => cmd('ranking');
      btnNext.style.background = '#c8a84b';
      btnNext.style.color = '#000';
    } else if (isRanking) {
      btnNext.textContent = '← Trocar Quiz';
      btnNext.onclick = () => cmd('backToSelect');
      btnNext.style.background = '#1a2a40';
      btnNext.style.color = '#7a9cc8';
    } else {
      btnNext.textContent = '▶ Próxima Questão';
      btnNext.onclick = () => cmd('next');
      btnNext.style.background = '#1e5dbf';
      btnNext.style.color = '#fff';
    }

    // Views
    showView(state.phase);

    if (state.phase === 'lobby') {
      document.getElementById('lobbyCount').textContent = state.participantCount || 0;
      const url = window.location.origin;
      document.getElementById('lobbyUrl').textContent = url;
      QRCode.toCanvas(document.getElementById('qr-code'), url, { width: 200, margin: 1, color: { dark: '#000', light: '#fff' } });
    }

    if ((state.phase === 'question' || state.phase === 'reveal') && state.question) {
      renderQuestion(state);
    }

    if (state.phase === 'ranking' && state.ranking) {
      renderRanking(state.ranking);
    }

    if (state.answerCounts !== undefined) {
      updateAnswerCounts(state);
    }
  }

  function showView(phase) {
    document.getElementById('select-quiz-view').classList.toggle('hidden', phase !== 'selectQuiz');
    document.getElementById('lobby-view').classList.toggle('hidden', phase !== 'lobby' && phase !== 'finished');
    document.getElementById('question-view').classList.toggle('hidden', phase === 'selectQuiz' || phase === 'lobby' || phase === 'ranking' || phase === 'finished');
    document.getElementById('ranking-view').classList.toggle('hidden', phase !== 'ranking');

    const lobbyParticipants = document.querySelector('.lobby-participants');
    if (lobbyParticipants) {
      if (phase === 'finished') {
        lobbyParticipants.innerHTML = '⏳ Clique em <strong style="color:var(--dourado)">🏆 Revelar Ranking</strong> quando quiser';
      } else if (phase === 'lobby') {
        lobbyParticipants.innerHTML = `Participantes prontos: <strong id="lobbyCount">0</strong>`;
      }
    }
  }

  let _lastMediaUrl = null; // evita recriar o elemento de vídeo a cada update de respostas

  // ── Lightbox ──────────────────────────────────────────────────────────────
  function openLightbox(url, type) {
    const lb = document.getElementById('lightbox');
    // Remove mídia anterior se houver
    const old = document.getElementById('lightbox-media');
    if (old) old.remove();

    let el;
    if (type === 'video') {
      el = document.createElement('video');
      el.src = url; el.controls = true; el.autoplay = true; el.playsInline = true;
    } else {
      el = document.createElement('img');
      el.src = url;
    }
    el.id = 'lightbox-media';
    el.onclick = e => e.stopPropagation();
    lb.appendChild(el);
    lb.classList.add('open');
  }

  function closeLightbox() {
    const lb = document.getElementById('lightbox');
    lb.classList.remove('open');
    const v = lb.querySelector('video');
    if (v) { v.pause(); v.remove(); }
    const img = lb.querySelector('img');
    if (img) img.remove();
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  // ── Pré-carregamento de todas as mídias ───────────────────────────────────
  function preloadAllMedia(questions) {
    if (!questions) return;
    questions.forEach(q => {
      [q.mediaUrl, q.revealMediaUrl].forEach(url => {
        if (!url) return;
        const ext = url.split('.').pop().toLowerCase();
        const isVideo = ['mp4','webm','mov','ogg'].includes(ext);
        if (isVideo) {
          const v = document.createElement('video');
          v.src = url; v.preload = 'auto'; v.style.display = 'none';
          document.body.appendChild(v);
        } else {
          const img = new Image();
          img.src = url;
        }
      });
    });
  }

  // ── buildMediaElement ─────────────────────────────────────────────────────
  function buildMediaElement(url, type, btnPlay) {
    const wrapper = document.getElementById('mediaWrapper');
    wrapper.innerHTML = '';

    const hint = document.createElement('div');
    hint.className = 'expand-hint';
    hint.textContent = '⛶';

    // Limpa handlers anteriores antes de definir novos
    wrapper.onclick = null;
    wrapper.ondblclick = null;

    if (type === 'video') {
      const video = document.createElement('video');
      video.src = url;
      video.preload = 'auto';
      video.playsInline = true;
      video.style.cssText = 'width:100%;max-height:62vh;object-fit:contain;display:block;';
      const overlay = document.createElement('div');
      overlay.className = 'video-overlay';
      overlay.id = 'videoOverlay';
      overlay.innerHTML = '<div class="play-icon">▶</div>';
      // stopPropagation garante que o clique no overlay não suba pro wrapper
      overlay.onclick = e => {
        // Clique no ícone ▶ → play/pause; clique no resto → lightbox
        if (e.target.closest('.play-icon')) {
          toggleVideo();
        } else {
          openLightbox(url, 'video');
        }
      };
      wrapper.appendChild(video);
      wrapper.appendChild(overlay);
      wrapper.appendChild(hint);
      wrapper.onclick = null;
      video.addEventListener('ended', () => {
        overlay.classList.remove('playing');
        btnPlay.textContent = '▶ Play Vídeo';
      });
      btnPlay.style.display = 'block';
      btnPlay.textContent = '▶ Play Vídeo';
    } else {
      const img = document.createElement('img');
      img.src = url;
      img.style.cssText = 'width:100%;max-height:62vh;object-fit:contain;display:block;';
      wrapper.appendChild(img);
      wrapper.appendChild(hint);
      // Clique simples → lightbox
      wrapper.onclick = () => openLightbox(url, 'image');
      btnPlay.style.display = 'none';
    }
  }

  function renderQuestion(state) {
    const q = state.question;
    document.getElementById('qLabel').textContent = `Questão ${state.currentIndex + 1} de ${state.totalQuestions}`;

    // Na fase reveal, se houver mídia de revelação, usa ela; senão mantém a original
    const isReveal = state.phase === 'reveal';
    const activeMediaUrl  = (isReveal && q.revealMediaUrl)  ? q.revealMediaUrl  : q.mediaUrl;
    const activeMediaType = (isReveal && q.revealMediaUrl)  ? q.revealMediaType : q.mediaType;

    const hasMedia = !!activeMediaUrl;
    const layout = document.getElementById('qLayout');
    const mediaCol = document.getElementById('qMediaCol');
    const btnPlay = document.getElementById('btnPlayPause');

    layout.className = hasMedia ? 'q-layout' : 'q-layout no-media';
    mediaCol.classList.toggle('hidden', !hasMedia);

    if (hasMedia) {
      document.getElementById('qPromptMedia').textContent = q.prompt;
      document.getElementById('qPromptBig').textContent = '';

      // Reconstrói se mudou a URL ativa (questão nova OU transição question→reveal com mídia diferente)
      if (_lastMediaUrl !== activeMediaUrl) {
        _lastMediaUrl = activeMediaUrl;
        buildMediaElement(activeMediaUrl, activeMediaType, btnPlay);
      }
    } else {
      document.getElementById('qPromptBig').textContent = q.prompt;
      document.getElementById('qPromptMedia').textContent = '';
      if (_lastMediaUrl !== null) {
        _lastMediaUrl = null;
        document.getElementById('mediaWrapper').innerHTML = '';
      }
      btnPlay.style.display = 'none';
    }

    // Opções
    const grid = document.getElementById('optionsGrid');
    const n = q.optionLabels.length;
    grid.className = `options-grid cols-${n <= 3 ? n : 2}${hasMedia ? ' has-media' : ''}`;
    const answerTotal = state.answerTotal || 0;
    grid.innerHTML = '';
    q.optionLabels.forEach((label, i) => {
      const count = state.answerCounts ? (state.answerCounts[i] || 0) : 0;
      const pct = answerTotal > 0 ? Math.round((count / answerTotal) * 100) : 0;
      const isCorrect = state.phase === 'reveal' && q.correctIndex === i;
      const isWrong = state.phase === 'reveal' && q.correctIndex !== null && i !== q.correctIndex;
      grid.innerHTML += `
        <div class="opt-card opt-c-${i} ${isCorrect ? 'correct' : ''} ${isWrong ? 'wrong' : ''}">
          <span class="opt-label">${label}</span>
          <span class="opt-count">${state.phase === 'reveal' ? `${count} (${pct}%)` : count}</span>
          <div class="opt-bar" style="width:${pct}%"></div>
        </div>`;
    });

    // Progress bar
    const pct = state.totalQuestions > 0 ? ((state.currentIndex + 1) / state.totalQuestions) * 100 : 0;
    document.getElementById('progressFill').style.width = pct + '%';
  }

  function toggleVideo() {
    const wrapper = document.getElementById('mediaWrapper');
    if (!wrapper) return;
    const video = wrapper.querySelector('video');
    const overlay = wrapper.querySelector('.video-overlay');
    const btn = document.getElementById('btnPlayPause');
    if (!video) return;
    if (video.paused) {
      video.play();
      overlay && overlay.classList.add('playing');
      btn.textContent = '⏸ Pause Vídeo';
    } else {
      video.pause();
      overlay && overlay.classList.remove('playing');
      btn.textContent = '▶ Play Vídeo';
    }
  }

  function updateAnswerCounts(extra) {
    if (!extra) return;
    document.getElementById('answerCount').textContent = extra.answerTotal || 0;
    document.getElementById('answerTotal').textContent = extra.participantCount || 0;
    // Atualiza contador do header e do lobby sempre que chegar participantCount
    if (extra.participantCount !== undefined) {
      document.getElementById('hdrP').textContent = extra.participantCount;
      const lobbyCount = document.getElementById('lobbyCount');
      if (lobbyCount) lobbyCount.textContent = extra.participantCount;
    }
    // Atualizar cards se visíveis
    if (currentState && (currentState.phase === 'question' || currentState.phase === 'reveal')) {
      currentState = { ...currentState, ...extra };
      renderQuestion(currentState);
    }
  }

  function renderRanking(ranking) {
    const medals = ['🥇','🥈','🥉'];
    const list = document.getElementById('rankListBig');
    list.innerHTML = '';
    ranking.slice(0, 10).forEach(item => {
      const pos = item.rank <= 3 ? medals[item.rank - 1] : `${item.rank}º`;
      list.innerHTML += `
        <div class="rank-row ${item.rank <= 3 ? 'top' : ''}">
          <div class="rank-pos-big">${pos}</div>
          <div class="rank-name-big">${item.name}</div>
          <div>
            <div class="rank-pts-big">${item.score} pts</div>
            <div class="rank-time-big">${(item.totalMs / 1000).toFixed(1)}s acumulado</div>
          </div>
        </div>`;
    });
  }
</script>
